<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Water</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Add Water</h1>
    <a class="btn" href="{{ url_for('nutrition_page') }}">Back</a>
  </div>

  <!-- Form -->
  <form method="post" action="{{ url_for('handle_add_water') }}">

    <div class="form-group">
      <label>Date</label>
      <input type="date" name="date" required>
    </div>

    <div class="form-group">
      <label>Amount (oz)</label>
      <input type="number" name="amount" required min="0">
    </div>

    <button class="btn" type="submit">Save</button>

  </form>

</div>

</body>
</html>
