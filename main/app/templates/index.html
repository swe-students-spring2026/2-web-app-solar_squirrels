<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Workout Tracker</h1>
      </div>
      <form action="/api/auth/login" method="POST">
        <div class="form-group">
          <label
            >Username:
            <input type="text" name="username" required />
          </label>
          <br />
          <label
            >Password:
            <input type="password" name="password" required />
          </label>

          <button
            class="btn"
            type="submit"
            style="width: 100%; margin-top: 10px"
          >
            Login
          </button>
        </div>
      </form>
      <a href="{{ url_for('register_page') }}" style="text-decoration: none;">
        <button type="button" class="btn" style="width: 100%; background: #28a745">
          Sign Up
        </button>
      </a>
      </button>
    </div>
  </body>
</html>
